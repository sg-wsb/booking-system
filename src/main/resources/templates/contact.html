<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Kontakt</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">

    <h3>Kontakt</h3>

    <div class="card p-4">

        <form method="post" action="/contact">

            <input type="text" name="subject" class="form-control mb-3" placeholder="Temat" required>

            <textarea name="message" class="form-control mb-3" rows="5" placeholder="Wiadomość" required></textarea>

            <button class="btn btn-dark">Wyślij</button>

        </form>

    </div>

</div>

</body>
</html>
