<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Rejestracja</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card p-4 shadow-sm mx-auto" style="max-width: 400px;">
        <h4 class="mb-3 text-center">Rejestracja</h4>

        <form method="post" action="/register">

            <input type="text" name="firstName" class="form-control mb-2" placeholder="Imię" required>
            <input type="text" name="lastName" class="form-control mb-2" placeholder="Nazwisko" required>
            <input type="email" name="email" class="form-control mb-2" placeholder="Email" required>
            <input type="password" name="password" class="form-control mb-3" placeholder="Hasło" required>

            <button class="btn btn-dark w-100">Zarejestruj</button>

        </form>

    </div>

</div>

</body>
</html>
