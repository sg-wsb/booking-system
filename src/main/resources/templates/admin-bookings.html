<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Rezerwacje</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background: #f5f6fa; }
        .card { border-radius: 12px; }
    </style>
</head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">

    <div class="d-flex justify-content-between mb-4">
        <h3>Rezerwacje</h3>
        <a href="/admin" class="btn btn-outline-dark">← Panel</a>
    </div>

    <div class="card p-4 shadow-sm">

        <table class="table table-striped align-middle">

            <thead>
            <tr>
                <th>Imię</th>
                <th>Nazwisko</th>
                <th>Email</th>
                <th>Start</th>
                <th>Koniec</th>
                <th></th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="b : ${bookings}">

                <td th:text="${b.user.firstName}"></td>
                <td th:text="${b.user.lastName}"></td>
                <td th:text="${b.user.email}"></td>

                <td th:text="${#temporals.format(b.slot.startTime, 'dd.MM HH:mm')}"></td>
                <td th:text="${#temporals.format(b.slot.endTime, 'dd.MM HH:mm')}"></td>

                <td>
                    <form th:action="@{'/admin/bookings/delete/' + ${b.id}}"
                          method="post"
                          onsubmit="return confirm('Anulować rezerwację?')">

                        <button class="btn btn-sm btn-outline-danger">
                            Anuluj
                        </button>

                    </form>
                </td>

            </tr>
            </tbody>

        </table>

    </div>

</div>

</body>
</html>
