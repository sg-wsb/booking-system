<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Logowanie</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card p-4 shadow-sm mx-auto" style="max-width: 400px;">
        <h4 class="text-center mb-3">Logowanie</h4>


        <div th:if="${param.error}" class="alert alert-danger">
            Nieprawidłowy email lub hasło
        </div>


        <div th:if="${param.logout}" class="alert alert-success">
            Wylogowano pomyślnie
        </div>

        <form method="post" action="/login">

            <input type="text" name="username" class="form-control mb-3" placeholder="Email" required autofocus>

            <input type="password" name="password" class="form-control mb-3" placeholder="Hasło" required>

            <button class="btn btn-dark w-100">Zaloguj</button>

        </form>

        <div class="text-center mt-3">
            <a href="/register">Rejestracja</a>
        </div>
    </div>

</div>

</body>
</html>
