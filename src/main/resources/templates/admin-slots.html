<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Zarządzanie terminami</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">


    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

    <style>
        body { background: #f5f6fa; }
        .card { border-radius: 12px; }
        .toast { border-radius: 10px; box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
    </style>
</head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">

    <div class="d-flex justify-content-between mb-4">
        <h3>Zarządzanie terminami</h3>
        <a href="/admin" class="btn btn-outline-dark">← Panel</a>
    </div>


    <div class="card p-4 mb-4 shadow-sm">

        <h5>Dodaj pojedynczy termin</h5>

        <form method="post" action="/admin/slots" class="row g-3">

            <div class="col-md-5">
                <input type="text" id="start" name="start" class="form-control" required>
            </div>

            <div class="col-md-5">
                <input type="text" id="end" name="end" class="form-control" required>
            </div>

            <div class="col-md-2">
                <button class="btn btn-dark w-100">Dodaj</button>
            </div>

        </form>

    </div>


    <div class="card p-4 mb-4 shadow-sm">

        <h5>Generuj wiele terminów</h5>

        <form method="post" action="/admin/slots/generate" class="row g-3">

            <div class="col-md-3">
                <input type="date" name="date" class="form-control" required>
            </div>

            <div class="col-md-2">
                <input type="time" name="startTime" class="form-control" required>
            </div>

            <div class="col-md-2">
                <input type="time" name="endTime" class="form-control" required>
            </div>

            <div class="col-md-2">
                <input type="number" name="interval" class="form-control" placeholder="min (np 30)" required>
            </div>

            <div class="col-md-3">
                <button class="btn btn-success w-100">Generuj</button>
            </div>

        </form>

    </div>


    <div class="card p-4 shadow-sm">

        <table class="table table-striped align-middle">

            <thead>
            <tr>
                <th>Start</th>
                <th>Koniec</th>
                <th>Status</th>
                <th></th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="slot : ${slots}">

                <td th:text="${#temporals.format(slot.startTime, 'dd.MM.yyyy HH:mm')}"></td>
                <td th:text="${#temporals.format(slot.endTime, 'dd.MM.yyyy HH:mm')}"></td>

                <td>
                    <span th:if="${slot.booked}" class="badge bg-danger">Zajęty</span>
                    <span th:unless="${slot.booked}" class="badge bg-success">Wolny</span>
                </td>

                <td>
                    <form th:action="@{'/admin/slots/delete/' + ${slot.id}}"
                          method="post"
                          onsubmit="return confirm('Usunąć termin?')">

                        <button class="btn btn-sm btn-outline-danger">
                            Usuń
                        </button>

                    </form>
                </td>

            </tr>
            </tbody>

        </table>

    </div>

</div>


<div class="position-fixed top-0 end-0 p-3" style="z-index: 9999">

    <div th:if="${success}" class="toast text-bg-success" id="successToast">
        <div class="d-flex">
            <div class="toast-body" th:text="${success}"></div>
            <button class="btn-close btn-close-white" data-bs-dismiss="toast"></button>
        </div>
    </div>

    <div th:if="${error}" class="toast text-bg-danger" id="errorToast">
        <div class="d-flex">
            <div class="toast-body" th:text="${error}"></div>
            <button class="btn-close btn-close-white" data-bs-dismiss="toast"></button>
        </div>
    </div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    flatpickr("#start", {
        enableTime: true,
        dateFormat: "Y-m-d\\TH:i",
        time_24hr: true
    });

    flatpickr("#end", {
        enableTime: true,
        dateFormat: "Y-m-d\\TH:i",
        time_24hr: true
    });

    document.addEventListener("DOMContentLoaded", function () {
        const s = document.getElementById('successToast');
        const e = document.getElementById('errorToast');

        if (s) new bootstrap.Toast(s, { delay: 3000 }).show();
        if (e) new bootstrap.Toast(e, { delay: 4000 }).show();
    });
</script>

</body>
</html>
