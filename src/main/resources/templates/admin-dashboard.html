<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Panel admina</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { background: #f5f6fa; }
        .card { border-radius: 12px; }
        .toast { border-radius: 10px; }
        .stat { font-size: 28px; font-weight: bold; }
    </style>
</head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">

    <h3 class="mb-4">Panel administratora</h3>

    <div class="row g-4 mb-4">
        <div class="col-md-3"><div class="card p-3 text-center"><div>Terminy</div><div class="stat" th:text="${totalSlots}"></div></div></div>
        <div class="col-md-3"><div class="card p-3 text-center"><div>Rezerwacje</div><div class="stat" th:text="${totalBookings}"></div></div></div>
        <div class="col-md-3"><div class="card p-3 text-center text-danger"><div>Zajęte</div><div class="stat" th:text="${bookedSlots}"></div></div></div>
        <div class="col-md-3"><div class="card p-3 text-center text-success"><div>Wolne</div><div class="stat" th:text="${freeSlots}"></div></div></div>
    </div>

    <div class="row g-4">
        <div class="col-md-6">
            <div class="card p-4">
                <canvas id="chart"></canvas>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card p-4">
                <table class="table table-sm">
                    <tr th:each="b : ${latestBookings}">
                        <td th:text="${b.user.firstName}"></td>
                        <td th:text="${#temporals.format(b.slot.startTime, 'dd.MM HH:mm')}"></td>
                    </tr>
                </table>
            </div>
        </div>
    </div>

</div>

<div class="position-fixed top-0 end-0 p-3">
    <div th:if="${success}" class="toast text-bg-success" id="successToast">
        <div class="toast-body" th:text="${success}"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script th:inline="javascript">
    const booked = [[${bookedSlots}]];
    const free = [[${freeSlots}]];

    new Chart(document.getElementById('chart'), {
        type: 'doughnut',
        data: {
            labels: ['Zajęte', 'Wolne'],
            datasets: [{
                data: [booked, free],
                backgroundColor: ['#dc3545', '#198754']
            }]
        }
    });
</script>

</body>
</html>
