<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Terminy</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background: #f5f6fa; }
        .card { border-radius: 12px; }
        .toast { border-radius: 10px; box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
    </style>
</head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">

    <h3 class="mb-4">Dostępne terminy</h3>


    <div class="card p-3 mb-4 shadow-sm">

        <form method="get" action="/slots" class="row g-3 align-items-center">

            <div class="col-md-4">
                <input type="date"
                       name="date"
                       class="form-control"
                       th:value="${selectedDate}">
            </div>

            <div class="col-md-4 form-check">
                <input type="checkbox"
                       name="onlyFree"
                       value="true"
                       class="form-check-input"
                       id="onlyFree"
                       th:checked="${onlyFree}">
                <label class="form-check-label" for="onlyFree">
                    Tylko wolne terminy
                </label>
            </div>

            <div class="col-md-2">
                <button class="btn btn-dark w-100">Filtruj</button>
            </div>

            <div class="col-md-2">
                <a href="/slots" class="btn btn-outline-secondary w-100">
                    Reset
                </a>
            </div>

        </form>

    </div>


    <div class="card p-4 shadow-sm">

        <table class="table table-striped align-middle">

            <thead>
            <tr>
                <th>Start</th>
                <th>Koniec</th>
                <th>Status</th>
                <th></th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="slot : ${slots}">

                <td th:text="${#temporals.format(slot.startTime, 'dd.MM.yyyy HH:mm')}"></td>
                <td th:text="${#temporals.format(slot.endTime, 'dd.MM.yyyy HH:mm')}"></td>

                <td>
                    <span th:if="${slot.booked}" class="badge bg-danger">Zajęty</span>
                    <span th:unless="${slot.booked}" class="badge bg-success">Wolny</span>
                </td>

                <td>
                    <form th:if="${!slot.booked}"
                          th:action="@{'/book/' + ${slot.id}}"
                          method="post">

                        <button class="btn btn-sm btn-dark">
                            Rezerwuj
                        </button>

                    </form>
                </td>

            </tr>
            </tbody>

        </table>

    </div>

</div>


<div class="position-fixed top-0 end-0 p-3" style="z-index: 9999">

    <div th:if="${success}" class="toast text-bg-success" id="successToast">
        <div class="d-flex">
            <div class="toast-body" th:text="${success}"></div>
            <button class="btn-close btn-close-white" data-bs-dismiss="toast"></button>
        </div>
    </div>

    <div th:if="${error}" class="toast text-bg-danger" id="errorToast">
        <div class="d-flex">
            <div class="toast-body" th:text="${error}"></div>
            <button class="btn-close btn-close-white" data-bs-dismiss="toast"></button>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const s = document.getElementById('successToast');
        const e = document.getElementById('errorToast');

        if (s) new bootstrap.Toast(s, { delay: 3000 }).show();
        if (e) new bootstrap.Toast(e, { delay: 4000 }).show();
    });
</script>

</body>
</html>
