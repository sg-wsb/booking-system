<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Kalendarz</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>

    <style>
        body { background: #f5f6fa; }

        #calendar {
            max-width: 1000px;
            margin: 40px auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
        }

        .toast {
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
    </style>
</head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div id="calendar"></div>

<div class="modal fade" id="bookingModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Rezerwacja terminu</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <p id="slotInfo"></p>
            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">
                    Anuluj
                </button>

                <button class="btn btn-success" id="confirmBooking">
                    <span id="btnText">Rezerwuj</span>
                    <span id="btnSpinner" class="spinner-border spinner-border-sm d-none"></span>
                </button>
            </div>

        </div>
    </div>
</div>

<div class="position-fixed top-0 end-0 p-3" style="z-index:9999">
    <div id="successToast" class="toast text-bg-success">
        <div class="d-flex">
            <div class="toast-body">
                ✔ Rezerwacja zapisana
            </div>
            <button class="btn-close btn-close-white" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', function () {

        let selectedSlotId = null;

        const modal = new bootstrap.Modal(document.getElementById('bookingModal'));
        const toast = new bootstrap.Toast(document.getElementById('successToast'));

        const btn = document.getElementById('confirmBooking');
        const btnText = document.getElementById('btnText');
        const spinner = document.getElementById('btnSpinner');

        const calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {

            initialView: 'timeGridWeek',

            hiddenDays: [0, 6],

            slotMinTime: "08:00:00",
            slotMaxTime: "20:00:00",

            allDaySlot: false,

            events: '/api/slots',

            eventClick: function(info) {

                if (info.event.extendedProps.booked) return;

                selectedSlotId = info.event.id;

                document.getElementById('slotInfo').innerText =
                    "Termin: " + info.event.start.toLocaleString();

                modal.show();
            },

            eventDidMount: function(info) {
                info.el.title = info.event.title;
            }

        });

        calendar.render();

        btn.addEventListener('click', function () {

            btn.disabled = true;
            spinner.classList.remove("d-none");
            btnText.innerText = "Zapisywanie...";

            fetch('/book/' + selectedSlotId, {
                method: 'POST'
            })
                .then(() => {

                    modal.hide();
                    toast.show();

                    calendar.refetchEvents();

                })
                .catch(() => {
                    alert("Błąd rezerwacji");
                })
                .finally(() => {
                    btn.disabled = false;
                    spinner.classList.add("d-none");
                    btnText.innerText = "Rezerwuj";
                });

        });

    });
</script>

</body>
</html>
