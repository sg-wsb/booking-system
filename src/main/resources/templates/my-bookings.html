<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Moje rezerwacje</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background: #f5f6fa; }
        .card { border-radius: 12px; }
        .toast { border-radius: 10px; box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
    </style>
</head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">

    <h3 class="mb-4">Moje rezerwacje</h3>

    <div class="card p-4 shadow-sm">

        <table class="table table-striped align-middle">

            <thead>
            <tr>
                <th>Start</th>
                <th>Koniec</th>
                <th>Utworzono</th>
                <th></th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="b : ${bookings}">

                <td th:text="${#temporals.format(b.slot.startTime, 'dd.MM.yyyy HH:mm')}"></td>
                <td th:text="${#temporals.format(b.slot.endTime, 'dd.MM.yyyy HH:mm')}"></td>
                <td th:text="${#temporals.format(b.createdAt, 'dd.MM.yyyy HH:mm')}"></td>


                <td>

                    <th:block th:if="${b.slot.startTime.isAfter(T(java.time.LocalDateTime).now().plusHours(24))}">

                        <form th:action="@{'/bookings/cancel/' + ${b.id}}"
                              method="post"
                              onsubmit="return confirm('Anulować rezerwację?')">

                            <button class="btn btn-sm btn-outline-danger">
                                Anuluj
                            </button>

                        </form>

                    </th:block>


                    <th:block th:unless="${b.slot.startTime.isAfter(T(java.time.LocalDateTime).now().plusHours(24))}">
                        <span class="text-muted small">
                            <i>Nie można anulować (&lt;24h)</i>
                        </span>
                    </th:block>

                </td>

            </tr>
            </tbody>

        </table>

    </div>

</div>


<div class="position-fixed top-0 end-0 p-3" style="z-index: 9999">

    <div th:if="${success}" class="toast text-bg-success" id="successToast">
        <div class="d-flex">
            <div class="toast-body" th:text="${success}"></div>
            <button class="btn-close btn-close-white" data-bs-dismiss="toast"></button>
        </div>
    </div>

    <div th:if="${error}" class="toast text-bg-danger" id="errorToast">
        <div class="d-flex">
            <div class="toast-body" th:text="${error}"></div>
            <button class="btn-close btn-close-white" data-bs-dismiss="toast"></button>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.addEventListener("DOMContentLoaded", function () {

        const s = document.getElementById('successToast');
        const e = document.getElementById('errorToast');

        if (s) new bootstrap.Toast(s, { delay: 3000 }).show();
        if (e) new bootstrap.Toast(e, { delay: 4000 }).show();

    });
</script>

</body>
</html>
